finops = "Audit cloud costs, optimize API token usage, and evaluate pricing models."
legal = "Generate TOS/Privacy policies, audit GDPR compliance, and review licenses."
linear = "Project Management specialist. Converts PRDs into actionable Linear Epics and Issues."
marketing = "Growth, SEO, and Copywriting specialist. Use this to optimize for Revenue (Cuan)."
plan = "Restate requirements, assess risks, and create a step-by-step implementation plan with Vertical Slices (Tracer Bullets)."
release = "Orchestrate the launch process, bump versions, and generate changelogs."
review = "Perform a principal-level code review of the current changes against the PRD and Design System."
seo = "Diagnose and audit SEO issues. Injects Schema.org markup and optimizes for Answer Engines (AEO)."
tdd = "Enforce test-driven development workflow. Scaffold interfaces, generate tests FIRST, then implement minimal code to pass. Ensure 80%+ coverage."
triage = "Triage a bug or issue. Explore the codebase to find root cause, then create a fix plan."
video = "Programmatic video generation specialist using React and Remotion."
